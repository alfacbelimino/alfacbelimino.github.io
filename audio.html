    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; background: #f4f6f7; color: #1a3a4a; min-height: 100vh; display: flex; flex-direction: column; }

        #player-container { display: none; background: #000; width: 100%; }
        #player-balk { display: flex; align-items: center; justify-content: space-between; background: #056181; padding: 10px 14px; border-bottom: 1px solid #09b9bb; gap: 10px; }
        #player-titel { font-size: 0.9rem; flex: 1; color: #ffffff; }
        #deel-knop { flex-shrink: 0; background: #e06025; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-family: Georgia, serif; font-size: 0.8rem; cursor: pointer; }
        #deel-knop:active { background: #09b9bb; }
        #soundcloud-iframe { width: 100%; height: 166px; border: none; display: block; }

        #filter-balk { padding: 12px 14px; background: #ffffff; border-bottom: 2px solid #09b9bb; display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-knop { padding: 7px 14px; background: #f0f8f8; color: #056181; border: 2px solid #d0e8ec; border-radius: 20px; font-family: Georgia, serif; font-size: 0.82rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .filter-knop.actief { background: #056181; color: #fff; border-color: #056181; }

        #welkom { padding: 28px 16px; text-align: center; color: #056181; background: #ffffff; border-bottom: 2px solid #09b9bb; }
        #welkom .icoon { font-size: 2.5rem; margin-bottom: 12px; }
        #welkom p { font-size: 0.95rem; line-height: 1.6; color: #4a6a7a; }

        #knoppen-sectie { padding: 14px; flex: 1; background: #f4f6f7; }
        #aantal-label { font-size: 0.8rem; color: #6a8a9a; margin-bottom: 10px; }
        .audio-knop { display: flex; align-items: center; width: 100%; padding: 14px 16px; margin-bottom: 10px; background: #ffffff; border: 2px solid #d0e8ec; border-radius: 10px; color: #1a3a4a; font-size: 0.9rem; font-family: Georgia, serif; text-align: left; cursor: pointer; gap: 12px; transition: background 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; line-height: 1.4; box-shadow: 0 1px 3px rgba(5,97,129,0.07); }
        .audio-knop:active { transform: scale(0.98); }
        .audio-knop.actief { background: #e8f6f7; border-color: #09b9bb; }
        .niveau-badge { flex-shrink: 0; background: #e8f6f7; color: #056181; border-radius: 6px; padding: 2px 7px; font-size: 0.75rem; white-space: nowrap; }
        .audio-knop.actief .niveau-badge { background: #09b9bb; color: #fff; }
        .speel-icoon { flex-shrink: 0; color: #09b9bb; font-size: 1.1rem; }
        .audio-knop.actief .speel-icoon { color: #056181; }
        #zoek-wrapper { flex-shrink: 0; display: flex; align-items: center; background: #056181; padding: 0 8px; border-left: 1px solid #09b9bb; }
        #zoek-knop { background: none; border: none; color: #ffffff; font-size: 1.1rem; cursor: pointer; padding: 6px; line-height: 1; }
        #zoek-input { display: none; width: 140px; padding: 5px 8px; border: none; border-radius: 6px; font-family: Georgia, serif; font-size: 0.82rem; background: #ffffff; color: #1a3a4a; outline: none; }
        #zoek-input.open { display: block; }
</style>

        ];

        let actiefNiveau = '';
        let actiefKnop = null;

        function filterNiveau(btn) {
            actiefNiveau = btn.dataset.niveau;
            document.querySelectorAll('.filter-knop').forEach(b => b.classList.remove('actief'));
            btn.classList.add('actief');
            maakKnoppen();
        }

        function maakKnoppen() {
            const lijst = document.getElementById('knoppen-lijst');
            lijst.innerHTML = '';
            const gefilterd = actiefNiveau
                ? fragmenten.filter(f => f.niveau === actiefNiveau)
                : fragmenten;
            document.getElementById('aantal-label').textContent = gefilterd.length + " fragmenten";
            gefilterd.forEach(f => {
                const knop = document.createElement('button');
                knop.className = 'audio-knop';
                knop.innerHTML = '<span class="speel-icoon">▶</span><span class="niveau-badge">' + f.niveau + '</span><span>' + f.naam + '</span>';
                knop.addEventListener('click', () => speelAf(f, knop));
                lijst.appendChild(knop);
            });
        }

        function speelAf(f, knop) {
            document.getElementById('welkom').style.display = 'none';
            document.getElementById('player-container').style.display = 'block';
            document.getElementById('soundcloud-iframe').src = f.src;
            document.getElementById('player-titel').textContent = f.naam;
            document.querySelectorAll('.audio-knop').forEach(b => b.classList.remove('actief'));
            knop.classList.add('actief');
            actiefKnop = f;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deelAudio() {
            if (!actiefKnop) return;
            const link = window.location.origin + window.location.pathname + '?v=' + encodeURIComponent(actiefKnop.url);
            navigator.clipboard.writeText(link).then(() => {
                const knop = document.getElementById('deel-knop');
                knop.textContent = '✓ Gekopieerd!';
                setTimeout(() => knop.textContent = '🔗 Deel', 2000);
            });
        }

        // ?v= directe link
        const params = new URLSearchParams(window.location.search);
        const directUrl = params.get('v');
        if (directUrl) {
            const f = fragmenten.find(x => x.url === directUrl);
            if (f) {
                document.getElementById('welkom').style.display = 'none';
                document.getElementById('filter-balk').style.display = 'none';
                document.getElementById('knoppen-sectie').style.display = 'none';
                document.getElementById('deel-knop').style.display = 'none';
                document.getElementById('player-container').style.display = 'block';
                document.getElementById('soundcloud-iframe').src = f.src;
                document.getElementById('player-titel').textContent = f.naam;
            }
        } else {
            maakKnoppen();
        }
    </script>
