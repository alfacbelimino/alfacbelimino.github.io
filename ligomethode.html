<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Video's Ligomethode NT2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; background: #f4f6f7; color: #1a3a4a; min-height: 100vh; display: flex; flex-direction: column; }

        #video-container { width: 100%; background: #000; display: none; }
        #video-title-balk { display: flex; align-items: center; justify-content: space-between; background: #056181; padding: 10px 14px; border-bottom: 1px solid #09b9bb; gap: 10px; }
        #video-title { font-size: 0.9rem; flex: 1; color: #ffffff; }
        #deel-knop { flex-shrink: 0; background: #e06025; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-family: Georgia, serif; font-size: 0.8rem; cursor: pointer; }
        #deel-knop:active { background: #09b9bb; }
        #video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; }
        #video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        #video-knoppen-balk { display: none; flex-direction: row; }
        #fullscreen-knop { flex: 1; padding: 12px 14px; background: #f0f8f8; border: none; color: #056181; font-family: Georgia, serif; font-size: 0.95rem; cursor: pointer; border-top: 2px solid #09b9bb; letter-spacing: 0.04em; transition: background 0.2s; }
        #fullscreen-knop:active { background: #056181; color: #fff; }
        #minimize-knop { flex: 1; padding: 12px 14px; background: #f0f8f8; border: none; color: #056181; font-family: Georgia, serif; font-size: 0.95rem; cursor: pointer; border-top: 2px solid #09b9bb; border-left: 1px solid #09b9bb; letter-spacing: 0.04em; transition: background 0.2s; }
        #minimize-knop:active { background: #d0eaec; }

        #welkom { padding: 28px 16px; text-align: center; color: #056181; background: #ffffff; border-bottom: 2px solid #09b9bb; }
        #welkom .icoon { font-size: 2.5rem; margin-bottom: 12px; }
        #welkom p { font-size: 0.95rem; line-height: 1.6; color: #4a6a7a; }

        #knoppen-sectie { padding: 14px; flex: 1; background: #f4f6f7; }
        #aantal-label { font-size: 0.8rem; color: #6a8a9a; margin-bottom: 10px; }
        #filter-balk { padding: 12px 14px; background: #ffffff; border-bottom: 2px solid #09b9bb; flex-wrap: wrap; }
        #filter-balk select { width: 100%; padding: 10px 12px; background: #ffffff; color: #1a3a4a; border: 1.5px solid #09b9bb; border-radius: 8px; font-family: Georgia, serif; font-size: 0.95rem; cursor: pointer; }

        .video-knop { display: flex; align-items: center; width: 100%; padding: 14px 16px; margin-bottom: 10px; background: #ffffff; border: 2px solid #d0e8ec; border-radius: 10px; color: #1a3a4a; font-size: 0.95rem; font-family: Georgia, serif; text-align: left; cursor: pointer; gap: 12px; transition: background 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; line-height: 1.4; box-shadow: 0 1px 3px rgba(5,97,129,0.07); }
        .video-knop:active { transform: scale(0.98); }
        .video-knop.actief { background: #e8f6f7; border-color: #09b9bb; }
        .thema-badge { flex-shrink: 0; background: #e8f6f7; color: #056181; width: 90px; text-align: center; border-radius: 6px; padding: 2px 7px; font-size: 0.75rem; white-space: nowrap; }
        .video-knop.actief .thema-badge { background: #09b9bb; color: #fff; }

        #zoek-wrapper { flex-shrink: 0; display: flex; align-items: center; margin-left: auto; margin-top: 8px; }
        #zoek-knop { background: #e8f6f7; border: 1px solid #09b9bb; color: #056181; border-radius: 6px; padding: 3px 8px; font-size: 0.82rem; cursor: pointer; }
        #zoek-knop:active { background: #09b9bb; color: #fff; }
        #zoek-input { display: none; width: 130px; padding: 4px 8px; border: 1px solid #09b9bb; border-radius: 6px; font-family: Georgia, serif; font-size: 0.82rem; background: #ffffff; color: #1a3a4a; outline: none; margin-right: 6px; }
        #zoek-input.open { display: block; }
        #zoek-wis-knop { display: none; background: none; border: none; color: #056181; font-size: 0.9rem; cursor: pointer; padding: 4px 6px; margin-left: -4px; }
        #zoek-wis-knop.zichtbaar { display: inline-block; }
        #thema-wis-knop { display: none; background: none; border: none; color: #056181; font-size: 0.9rem; cursor: pointer; padding: 0 4px; }
        #thema-wis-knop.zichtbaar { display: inline-block; }

        #thema-filter-wrapper { position: relative; flex: 1; }
        #thema-filter { width: 100%; padding-right: 30px; }
        #thema-wis-knop {
            display: none;
            position: absolute;
            left: 150px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #056181;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 2px 4px;
        }
        #thema-wis-knop.zichtbaar { display: inline-block; }
    </style>
</head>

        </div>
        <div id="video-knoppen-balk">

    </div>

                <select id="thema-filter" onchange="filterThema()">

                    <option value="Verkeer">Verkeer</option>
                    <option value="Vrije tijd">Vrije tijd</option>
                    <option value="Documenten">Documenten</option>
                </select>

            </div>
            <div id="zoek-wrapper">
                <input id="zoek-input" type="text" placeholder="Zoeken..." oninput="zoekVideos(this.value)">
                <button id="zoek-wis-knop" onclick="wisZoekveld()">✕</button>
                <button id="zoek-knop" onclick="toggleZoek()">Zoek</button>
            </div>
        </div>
        <div id="knoppen-sectie">
            <div id="aantal-label"></div>
            <div id="knoppen-lijst"></div>

    </div>

    <script>

    { id: "GqJ-nqeQuvw", naam: "137 Een dagje winkelen", thema: "Vrije tijd" }
            
        ];

        let actiefThema = '';

        function init() { maakKnoppen(); }

        function filterThema() {
            const waarde = document.getElementById('thema-filter').value;
            document.getElementById('thema-wis-knop').classList.toggle('zichtbaar', waarde !== '');
            actiefThema = document.getElementById('thema-filter').value;
            maakKnoppen();
        }

        function maakKnoppen() {
            const lijst = document.getElementById('knoppen-lijst');
            lijst.innerHTML = '';
            const gefilterd = actiefThema ? videos.filter(v => v.thema === actiefThema) : videos;
            document.getElementById('aantal-label').textContent = gefilterd.length + " video's";
            gefilterd.forEach(video => {
                const knop = document.createElement('button');
                knop.className = 'video-knop';
                knop.innerHTML = '<span class="thema-badge">' + video.thema + '</span><span>' + video.naam + '</span>';
                knop.addEventListener('click', () => speelAf(video, knop));
                lijst.appendChild(knop);
            });
        }

        function speelAf(video, knop) {
            document.getElementById('welkom').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            const src = 'https://www.youtube-nocookie.com/embed/' + video.id + '?autoplay=0&iv_load_policy=3&loop=0&modestbranding=1&rel=0';
            document.getElementById('youtube-iframe').src = src;
            document.getElementById('video-title').textContent = video.naam;
            document.querySelectorAll('.video-knop').forEach(b => b.classList.remove('actief'));
            if (knop) knop.classList.add('actief');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('video-knoppen-balk').style.display = 'flex';
        }

        function zetVolledigScherm() {
            const el = document.getElementById('video-wrapper');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        }

        function verbergVideo() {
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('welkom').style.display = 'block';
            document.getElementById('youtube-iframe').src = '';
            document.querySelectorAll('.video-knop').forEach(b => b.classList.remove('actief'));
        }

        function deelVideo() {
            const iframe = document.getElementById('youtube-iframe');
            const match = iframe.src.match(/embed\/([^?]+)/);
            if (!match) return;
            const link = window.location.origin + window.location.pathname + '?v=' + match[1];
            navigator.clipboard.writeText(link).then(() => {
                const knop = document.getElementById('deel-knop');
                knop.textContent = '✓ Gekopieerd!';
                setTimeout(() => knop.textContent = '🔗 Deel', 2000);
            });
        }

        function toggleZoek() {
            const input = document.getElementById('zoek-input');
            input.classList.toggle('open');
            if (input.classList.contains('open')) {
                input.focus();
            } else {
                input.value = '';
                zoekVideos('');
            }
        }

        function zoekVideos(term) {
            document.getElementById('zoek-wis-knop').classList.toggle('zichtbaar', term.trim().length > 0);
            const zoekterm = term.trim().toLowerCase();
            if (!zoekterm) { maakKnoppen(); return; }
            const resultaten = videos.filter(v => v.naam.toLowerCase().includes(zoekterm));
            const lijst = document.getElementById('knoppen-lijst');
            lijst.innerHTML = '';
            document.getElementById('aantal-label').textContent = resultaten.length + " video's";
            resultaten.forEach(video => {
                const knop = document.createElement('button');
                knop.className = 'video-knop';
                knop.innerHTML = '<span class="thema-badge">' + video.thema + '</span><span>' + video.naam + '</span>';
                knop.addEventListener('click', () => speelAf(video, knop));
                lijst.appendChild(knop);
            });
        }

        const params = new URLSearchParams(window.location.search);
        const directId = params.get('v');
        if (directId) {
            document.getElementById('welkom').style.display = 'none';
            document.getElementById('nav-sectie').style.display = 'none';
            document.getElementById('deel-knop').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            const video = videos.find(v => v.id === directId);
            const naam = video ? video.naam : directId;
            const src = 'https://www.youtube-nocookie.com/embed/' + directId + '?autoplay=0&iv_load_policy=3&loop=0&modestbranding=1&rel=0';
            document.getElementById('youtube-iframe').src = src;
            document.getElementById('video-title').textContent = naam;
            document.getElementById('alleVideos').appendChild(document.createTextNode(`Overzicht (${videos.length} video's)`));
        } else {
            document.getElementById('nav-sectie').style.display = 'block';
            init();
        }

        function wisZoekveld() {
            const input = document.getElementById('zoek-input');
            input.value = '';
            zoekVideos('');
            document.getElementById('zoek-wis-knop').classList.remove('zichtbaar');
        }

        function wisThemaFilter() {
            document.getElementById('thema-filter').value = '';
            filterThema();
            document.getElementById('thema-wis-knop').classList.remove('zichtbaar');
        }
    </script>
</body>
</html>
