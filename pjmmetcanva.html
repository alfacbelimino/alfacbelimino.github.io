        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* HOOFDTABS */
        #hoofd-tabs { display: flex; background: #0d1b2e; border-bottom: 3px solid #e94560; flex-shrink: 0; }
        .hoofd-tab { flex: 1; padding: 12px; background: none; border: none; color: #a0a0b0; font-family: Georgia, serif; font-size: 0.95rem; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; }
        .hoofd-tab.actief { color: #f0f0f0; border-bottom-color: #e94560; }

        /* VIDEO SECTIE */
        #video-sectie { display: flex; flex-direction: column; flex: 1; }
        #video-container { width: 100%; background: #000; display: none; }
        #video-title-balk { display: flex; align-items: center; justify-content: space-between; background: #16213e; padding: 10px 14px; border-bottom: 1px solid #0f3460; gap: 10px; }
        #video-title { font-size: 0.9rem; flex: 1; }
        #deel-knop { flex-shrink: 0; background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-family: Georgia, serif; font-size: 0.8rem; cursor: pointer; }
        #fullscreen-knop { display: none; width: 100%; padding: 14px; background: #0f3460; border: none; color: #f0f0f0; font-family: Georgia, serif; font-size: 1rem; cursor: pointer; letter-spacing: 0.05em; }
        #fullscreen-knop:active { background: #e94560; }
        #video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; }
        #video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* WELKOM */
        #welkom { padding: 28px 16px; text-align: center; color: #a0a0b0; }
        #welkom .icoon { font-size: 2.5rem; margin-bottom: 12px; }
        #welkom p { font-size: 0.95rem; line-height: 1.6; }

        /* THEMA TABS */
        #thema-tabs, #thema-tabs-canva { display: flex; overflow-x: auto; background: #16213e; border-bottom: 2px solid #0f3460; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0; }
        #thema-tabs::-webkit-scrollbar, #thema-tabs-canva::-webkit-scrollbar { display: none; }
        .thema-tab { flex-shrink: 0; padding: 10px 14px; background: none; border: none; color: #a0a0b0; font-family: Georgia, serif; font-size: 0.82rem; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: color 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; }
        .thema-tab.actief { color: #f0f0f0; border-bottom-color: #e94560; }

        /* KNOPPEN */
        #knoppen-sectie, #canva-knoppen { padding: 14px; flex: 1; }
        .video-knop, .canva-knop { display: flex; align-items: center; width: 100%; padding: 14px 16px; margin-bottom: 10px; background: #16213e; border: 2px solid #0f3460; border-radius: 10px; color: #f0f0f0; font-size: 0.95rem; font-family: Georgia, serif; text-align: left; cursor: pointer; gap: 12px; transition: background 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; line-height: 1.4; text-decoration: none; }
        .video-knop:active, .canva-knop:active { transform: scale(0.98); }
        .video-knop.actief { background: #0f3460; border-color: #e94560; }
        .niveau-badge { flex-shrink: 0; background: #e94560; color: #fff; border-radius: 6px; padding: 2px 7px; font-size: 0.8rem; }
        .video-knop.actief .niveau-badge { background: #fff; color: #e94560; }

        /* CANVA SECTIE */
        #canva-sectie { display: none; flex-direction: column; flex: 1; }
        .canva-rij { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .canva-knop { flex: 1; margin-bottom: 0; }
        .deel-knop-canva { flex-shrink: 0; background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 8px 12px; font-family: Georgia, serif; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
</style>

        // ===== HOOFDTABS =====
        function toonSectie(sectie) {
            document.getElementById('video-sectie').style.display = sectie === 'video' ? 'flex' : 'none';
            document.getElementById('canva-sectie').style.display = sectie === 'canva' ? 'flex' : 'none';
            document.getElementById('tab-video').classList.toggle('actief', sectie === 'video');
            document.getElementById('tab-canva').classList.toggle('actief', sectie === 'canva');
            if (sectie === 'canva' && !canvaInit) initCanva();
        }

        // ===== VIDEO =====
        const themas = [...new Set(videos.map(v => v.thema))];
        let actiefThema = themas[0];

        function init() {
            const tabsEl = document.getElementById('thema-tabs');
            themas.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'thema-tab' + (t === actiefThema ? ' actief' : '');
                btn.textContent = t.replace('Thema ', 'T').replace(' - ', ' ');
                btn.addEventListener('click', () => selecteerThema(t));
                tabsEl.appendChild(btn);
            });
            maakKnoppen();
        }

        function selecteerThema(thema) {
            actiefThema = thema;
            document.querySelectorAll('#thema-tabs .thema-tab').forEach((b, i) => b.classList.toggle('actief', themas[i] === thema));
            maakKnoppen();
        }

        function maakKnoppen() {
            const lijst = document.getElementById('knoppen-sectie');
            lijst.innerHTML = '';
            videos.filter(v => v.thema === actiefThema).forEach(video => {
                const knop = document.createElement('button');
                knop.className = 'video-knop';
                const sterren = video.naam.includes('***') ? '***' : video.naam.includes('**') ? '**' : '*';
                const basis = video.naam.replace(/\*+/, '').trim();
                knop.innerHTML = '<span class="niveau-badge">' + sterren + '</span><span>' + basis + '</span>';
                knop.addEventListener('click', () => speelAf(video, knop));
                lijst.appendChild(knop);
            });
        }

        function speelAf(video, knop) {
            document.getElementById('welkom').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('fullscreen-knop').style.display = 'block';
            const src = 'https://www.youtube-nocookie.com/embed/' + video.id + '?autoplay=0&iv_load_policy=3&loop=0&modestbranding=1&rel=0';
            document.getElementById('youtube-iframe').src = src;
            document.getElementById('video-title').textContent = video.naam.replace(/\*+/, '').trim();
            document.querySelectorAll('.video-knop').forEach(b => b.classList.remove('actief'));
            if (knop) knop.classList.add('actief');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function zetVolledigScherm() {
            const el = document.getElementById('youtube-iframe');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        }

        function deelVideo() {
            const iframe = document.getElementById('youtube-iframe');
            const match = iframe.src.match(/embed\/([^?]+)/);
            if (!match) return;
            const link = window.location.origin + window.location.pathname + '?v=' + match[1];
            navigator.clipboard.writeText(link).then(() => {
                const knop = document.getElementById('deel-knop');
                knop.textContent = '✓ Gekopieerd!';
                setTimeout(() => knop.textContent = '🔗 Deel', 2000);
            });
        }

        // ===== CANVA =====
        const canvaThemas = [...new Set(canvaItems.map(v => v.thema))];
        let actiefCanvaThema = canvaThemas[0];
        let canvaInit = false;

        function initCanva() {
            canvaInit = true;
            const tabsEl = document.getElementById('thema-tabs-canva');
            canvaThemas.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'thema-tab' + (t === actiefCanvaThema ? ' actief' : '');
                btn.textContent = t.replace('Thema ', 'T').replace(' - ', ' ');
                btn.addEventListener('click', () => {
                    actiefCanvaThema = t;
                    document.querySelectorAll('#thema-tabs-canva .thema-tab').forEach((b, i) => b.classList.toggle('actief', canvaThemas[i] === t));
                    maakCanvaKnoppen();
                });
                tabsEl.appendChild(btn);
            });
            maakCanvaKnoppen();
        }

        function maakCanvaKnoppen() {
            const lijst = document.getElementById('canva-knoppen');
            lijst.innerHTML = '';
            canvaItems.filter(v => v.thema === actiefCanvaThema).forEach(item => {
                const rij = document.createElement('div');
                rij.className = 'canva-rij';
                const badge = item.sterren === '*-**-***' ? '✦' : item.sterren;
                const naam = item.naam.replace(/[\*]+/g, '').replace('*-**-***', '').trim();
                const knop = document.createElement('a');
                knop.className = 'canva-knop';
                knop.href = item.url;
                knop.target = '_blank';
                knop.rel = 'noopener';
                knop.innerHTML = '<span class="niveau-badge">' + badge + '</span><span>' + naam + '</span>';
                const deelKnop = document.createElement('button');
                deelKnop.className = 'deel-knop-canva';
                deelKnop.textContent = '🔗 Deel';
                deelKnop.onclick = () => {
                    navigator.clipboard.writeText(item.url).then(() => {
                        deelKnop.textContent = '✓';
                        setTimeout(() => deelKnop.textContent = '🔗 Deel', 2000);
                    });
                };
                rij.appendChild(knop);
                rij.appendChild(deelKnop);
                lijst.appendChild(rij);
            });
        }

        // ===== OPSTARTEN =====
        const params = new URLSearchParams(window.location.search);
        const directId = params.get('v');
        if (directId) {
            document.getElementById('welkom').style.display = 'none';
            document.getElementById('nav-sectie').style.display = 'none';
            document.getElementById('deel-knop').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            const video = videos.find(v => v.id === directId);
            const src = 'https://www.youtube-nocookie.com/embed/' + directId + '?autoplay=0&iv_load_policy=3&loop=0&modestbranding=1&rel=0';
            document.getElementById('youtube-iframe').src = src;
            document.getElementById('video-title').textContent = video ? video.naam.replace(/\*+/, '').trim() : directId;
        } else {
            document.getElementById('nav-sectie').style.display = 'block';
            init();
        }
    </script>
