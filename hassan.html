<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Filmpjes van Hassan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; background: #1a1a2e; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; }

        #video-container { width: 100%; background: #000; display: none; }
        #video-title-balk { display: flex; align-items: center; justify-content: space-between; background: #16213e; padding: 10px 14px; border-bottom: 1px solid #0f3460; gap: 10px; }
        #video-title { font-size: 0.9rem; flex: 1; }
        #deel-knop { flex-shrink: 0; background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-family: Georgia, serif; font-size: 0.8rem; cursor: pointer; }
        #video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; }
        #video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #fullscreen-knop { display: none; width: 100%; padding: 14px; background: #0f3460; border: none; color: #f0f0f0; font-family: Georgia, serif; font-size: 1rem; cursor: pointer; border-top: 2px solid #e94560; letter-spacing: 0.05em; }
        #fullscreen-knop:active { background: #e94560; }

        #welkom { padding: 28px 16px; text-align: center; color: #a0a0b0; }
        #welkom .icoon { font-size: 2.5rem; margin-bottom: 12px; }
        #welkom p { font-size: 0.95rem; line-height: 1.6; }

        #thema-tabs { display: flex; overflow-x: auto; background: #16213e; border-bottom: 2px solid #0f3460; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        #thema-tabs::-webkit-scrollbar { display: none; }
        .thema-tab { flex-shrink: 0; padding: 10px 14px; background: none; border: none; color: #a0a0b0; font-family: Georgia, serif; font-size: 0.82rem; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: color 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; }
        .thema-tab.actief { color: #f0f0f0; border-bottom-color: #e94560; }

        #knoppen-sectie { padding: 14px; flex: 1; }
        #aantal-label { font-size: 0.8rem; color: #a0a0b0; margin-bottom: 10px; }
        #filter-balk { padding: 12px 14px; background: #16213e; border-bottom: 2px solid #0f3460; }
        #filter-balk select { width: 100%; padding: 10px 12px; background: #0f3460; color: #f0f0f0; border: 2px solid #e94560; border-radius: 8px; font-family: Georgia, serif; font-size: 0.95rem; cursor: pointer; }

        .video-knop { display: flex; align-items: center; width: 100%; padding: 14px 16px; margin-bottom: 10px; background: #16213e; border: 2px solid #0f3460; border-radius: 10px; color: #f0f0f0; font-size: 0.95rem; font-family: Georgia, serif; text-align: left; cursor: pointer; gap: 12px; transition: background 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; line-height: 1.4; }
        .video-knop:active { transform: scale(0.98); }
        .video-knop.actief { background: #0f3460; border-color: #e94560; }
        .niveau-badge { flex-shrink: 0; background: #e94560; color: #fff; border-radius: 6px; padding: 2px 7px; font-size: 0.8rem; }
        .video-knop.actief .niveau-badge { background: #fff; color: #e94560; }
        .thema-badge { flex-shrink: 0; background: #0f3460; color: #a0c4ff; border-radius: 6px; padding: 2px 7px; font-size: 0.75rem; white-space: nowrap; }
        .video-knop.actief .thema-badge { background: #e94560; color: #fff; }
        .nummer { flex-shrink: 0; background: #e94560; color: #fff; border-radius: 50%; width: 28px; height: 28px; line-height: 28px; text-align: center; font-size: 0.8rem; }
        .video-knop.actief .nummer { background: #fff; color: #e94560; }
</style>
</head>
<body>
    <div id="welkom"><div class="icoon">▶</div><p>Kies een video.</p></div>
    
    <div id="video-container">
        <div id="video-title-balk">
            <span id="video-title"></span>
            <button id="deel-knop" onclick="deelVideo()">🔗 Deel</button>
        </div>
        <div id="video-wrapper"><iframe id="youtube-iframe" src="" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
        <button id="fullscreen-knop" onclick="zetVolledigScherm()">⛶ Volledig scherm</button>
    </div>
    <div id="nav-sectie">
        <div id="thema-tabs">
            <button class="thema-tab actief" id="tab-11">Hassan 1.1</button>
            <button class="thema-tab" id="tab-12">Hassan 1.2</button>
        </div>
        <div id="knoppen-sectie"></div>
    </div>
    <script>
        const videos = [
    { id: "SWTuU7Dc5s4", naam: "Thema 01 Welkom", groep: "1.1" },
    { id: "X8LOKAwczJI", naam: "Thema 02 Op bezoek", groep: "1.1" },
    { id: "-iPoHtkC2Dk", naam: "Thema 03 Een afspraak", groep: "1.1" },
    { id: "TaGaNnNUvQc", naam: "Thema 04 Het huiswerk", groep: "1.1" },
    { id: "nJ6OsfkWRPQ", naam: "Thema 05 Op de fiets", groep: "1.1" },
    { id: "UsywEJgAJRY", naam: "Thema 06 In de winkel", groep: "1.1" },
    { id: "byhTTeu18T8", naam: "Thema 07 De boete", groep: "1.1" },
    { id: "YeAksD1t3Xw", naam: "Thema 08 In het interimkantoor", groep: "1.1" },
    { id: "6wQxTESIWAI", naam: "Thema 09 Vrijwilligerswerk", groep: "1.1" },
    { id: "68WtSlBvWNw", naam: "Thema 10 De huisbaas", groep: "1.1" },
    { id: "oOn3xAsvjVo", naam: "De verhalen van de hodja:Hassan en de tijgers", groep: "1.1" },
    { id: "KUxbqc&t=6s", naam: "De verhalen van de hodja: de sleutel van Hassan", groep: "1.1" },
    { id: "SAgzaMYpn_Y", naam: "Extra : Het trouwfeest", groep: "1.2" },
    { id: "vgTLxrGaIkc", naam: "Thema 01 De Nederlandse les", groep: "1.2" },
    { id: "tGVqWmtxMuc", naam: "Thema 02 Een uitstap", groep: "1.2" },
    { id: "EviFJbnIjyk", naam: "Thema 03 Lawaai", groep: "1.2" },
    { id: "TDFlMdl66Do", naam: "Thema 04 Ik ben ziek", groep: "1.2" },
    { id: "T8jcjEaRNcg", naam: "Thema 05 Naar de winkel", groep: "1.2" },
    { id: "4wUFOYvOv2w", naam: "Thema 06 Ik wil werken", groep: "1.2" },
    { id: "PxxXNtdZOuw", naam: "Thema 07 Een nieuwe job", groep: "1.2" },
    { id: "y7FxIXZYFjk", naam: "Thema 08 Wil jij met mij trouwen", groep: "1.2" },
    { id: "F3UxeMvPnqY", naam: "Thema 09 Aan de schoolpoort", groep: "1.2" },
    { id: "7i16kLqlVpw", naam: "Thema 10 Naar de meubelwinkel", groep: "1.2" }
        ];
        let actiefGroep = '1.1';
        function init() {
            document.getElementById('tab-11').addEventListener('click', () => selecteerGroep('1.1'));
            document.getElementById('tab-12').addEventListener('click', () => selecteerGroep('1.2'));
            maakKnoppen();
        }
        function selecteerGroep(groep) {
            actiefGroep = groep;
            document.getElementById('tab-11').classList.toggle('actief', groep === '1.1');
            document.getElementById('tab-12').classList.toggle('actief', groep === '1.2');
            maakKnoppen();
        }
        function maakKnoppen() {
            const lijst = document.getElementById('knoppen-sectie');
            lijst.innerHTML = '';
            videos.filter(v => v.groep === actiefGroep).forEach((video, i) => {
                const knop = document.createElement('button');
                knop.className = 'video-knop';
                knop.innerHTML = '<span class="nummer">' + (i + 1) + '</span><span>' + video.naam + '</span>';
                knop.addEventListener('click', () => speelAf(video, knop));
                lijst.appendChild(knop);
            });
        }
        
        function speelAf(video, knop) {
            document.getElementById('welkom').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            const src = 'https://www.youtube-nocookie.com/embed/' + video.id + '?autoplay=0&iv_load_policy=3&loop=0&modestbranding=1&rel=0';
            document.getElementById('youtube-iframe').src = src;
            document.getElementById('video-title').textContent = video.naam;
            document.querySelectorAll('.video-knop').forEach(b => b.classList.remove('actief'));
            if (knop) knop.classList.add('actief');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('fullscreen-knop').style.display = 'block';
        }
        function zetVolledigScherm() {
            const el = document.getElementById('video-wrapper');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        }
        function deelVideo() {
            const iframe = document.getElementById('youtube-iframe');
            const match = iframe.src.match(/embed\/([^?]+)/);
            if (!match) return;
            const link = window.location.origin + window.location.pathname + '?v=' + match[1];
            navigator.clipboard.writeText(link).then(() => {
                const knop = document.getElementById('deel-knop');
                knop.textContent = '✓ Gekopieerd!';
                setTimeout(() => knop.textContent = '🔗 Deel', 2000);
            });
        }

        
        const params = new URLSearchParams(window.location.search);
        const directId = params.get('v');
        if (directId) {
            document.getElementById('welkom').style.display = 'none';
            document.getElementById('nav-sectie').style.display = 'none';
            document.getElementById('deel-knop').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            const video = videos.find(v => v.id === directId);
            const naam = video ? video.naam : directId;
            const src = 'https://www.youtube-nocookie.com/embed/' + directId + '?autoplay=0&iv_load_policy=3&loop=0&modestbranding=1&rel=0';
            document.getElementById('youtube-iframe').src = src;
            document.getElementById('video-title').textContent = naam;
        } else {
            document.getElementById('nav-sectie').style.display = 'block';
            init();
        }

    </script>
</body>
</html>
